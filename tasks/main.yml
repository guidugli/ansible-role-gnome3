---
- name: Gather package facts for GNOME role
  ansible.builtin.package_facts:
    manager: auto
  tags:
    - gnome3
    - gnome3_validate

- name: Determine GNOME session version
  ansible.builtin.set_fact:
    gnome_version: "{{ ansible_facts['packages']['gnome-session'][0]['version'] | split('.') | first }}"
  when: "'gnome-session' in ansible_facts['packages']"
  tags:
    - gnome3
    - gnome3_validate

- name: Determine dconf template path for detected GNOME version
  ansible.builtin.set_fact:
    _gnome_dconf_template_src: "10-ansible-gnome{{ gnome_version }}"
  when:
    - gnome_version is defined
    - gnome_version in _gnome_supported_versions
  tags:
    - gnome3
    - gnome3_validate

- name: Validate detected GNOME version is supported by this role
  ansible.builtin.assert:
    that:
      - gnome_version in _gnome_supported_versions
    fail_msg: >-
      Unsupported GNOME version {{ gnome_version }}. Add a matching template under templates/
      or update the role before applying desktop dconf settings.
    quiet: true
  when: gnome_version is defined
  tags:
    - gnome3
    - gnome3_validate

- name: Ensure role-managed dconf directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
    modification_time: preserve
    access_time: preserve
  loop: "{{ _gnome_role_dconf_directories }}"
  when:
    - gnome_version is defined
    - "'dconf' in ansible_facts['packages']"
  tags:
    - gnome3
    - gnome3_config

- name: Render desktop dconf profile
  ansible.builtin.template:
    src: "{{ _gnome_dconf_template_src }}"
    dest: /etc/dconf/db/local.d/10-ansible
    owner: root
    group: root
    mode: '0644'
    force: true
  notify: Refresh dconf database
  when:
    - gnome_version is defined
    - "'dconf' in ansible_facts['packages']"
    - _gnome_dconf_template_src is defined
  tags:
    - gnome3
    - gnome3_config

- name: Render locked dconf keys
  ansible.builtin.template:
    src: 00-ansible-lock
    dest: /etc/dconf/db/local.d/locks/00-ansible-lock
    owner: root
    group: root
    mode: '0644'
    force: true
  notify: Refresh dconf database
  when:
    - gnome_version is defined
    - "'dconf' in ansible_facts['packages']"
  tags:
    - gnome3
    - gnome3_config

- name: Render polkit admin group rules
  ansible.builtin.template:
    src: 40-default.rules.j2
    dest: /etc/polkit-1/rules.d/40-default.rules
    owner: root
    group: root
    mode: '0644'
    force: true
  when: gnome_admin_group is defined
  tags:
    - gnome3
    - gnome3_config

- name: Include GDM configuration tasks
  ansible.builtin.include_tasks: gdm.yml
  when:
    - gnome_version is defined
    - "'dconf' in ansible_facts['packages']"
  tags:
    - gnome3
    - gnome3_config
